<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoverLocal - PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-purple: #8B5CF6;
            --primary-blue: #3B82F6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
        
        .glass-dark {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .screen-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .category-pill {
            transition: all 0.2s ease;
        }
        
        .category-pill:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .place-card {
            transition: all 0.2s ease;
        }
        
        .place-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .bottom-nav-item {
            transition: all 0.2s ease;
        }
        
        .bottom-nav-item:hover {
            transform: scale(1.1);
        }
        
        .expandable-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .expandable-section.expanded {
            max-height: 500px;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        
        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-pink-50 min-h-screen pb-20 font-sans overflow-x-hidden">

    <!-- Main App Container -->
    <div id="app" class="relative">
        
        <!-- Header (Search and Filters) -->
        <header class="fixed top-0 left-0 right-0 z-40 p-6 bg-gradient-to-b from-white/80 to-transparent">
            <div class="glass rounded-3xl p-4 shadow-sm mb-4">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Find places near you" class="w-full bg-transparent outline-none text-gray-700 p-2 placeholder-gray-400">
                </div>
            </div>
            
            <!-- Radius Filters -->
            <div class="flex gap-2 no-scrollbar overflow-x-auto pb-2 text-sm text-gray-500">
                <button class="radius-filter glass px-4 py-2 rounded-full whitespace-nowrap bg-purple-500 text-white" data-radius="5">within 5km</button>
                <button class="radius-filter glass px-4 py-2 rounded-full whitespace-nowrap hover:bg-white/50" data-radius="10">10km</button>
                <button class="radius-filter glass px-4 py-2 rounded-full whitespace-nowrap hover:bg-white/50" data-radius="45">45km</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="pt-32">
            <!-- Home Screen (List View) -->
            <div id="homeScreen" class="screen">
                <!-- Categories -->
                <section class="flex gap-4 overflow-x-auto px-6 no-scrollbar pb-4">
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="food">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🍕</span>
                        </div>
                        <span class="text-xs text-gray-600">Food Stores</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="hotels">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🏨</span>
                        </div>
                        <span class="text-xs text-gray-600">Hotels</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="restrooms">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🚻</span>
                        </div>
                        <span class="text-xs text-gray-600">Restrooms</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="travel">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🌄</span>
                        </div>
                        <span class="text-xs text-gray-600">Travel Spots</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="cafes">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">☕</span>
                        </div>
                        <span class="text-xs text-gray-600">Cafes</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="shopping">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🛍️</span>
                        </div>
                        <span class="text-xs text-gray-600">Shopping</span>
                    </div>
                    <div class="category-item flex flex-col items-center gap-2 cursor-pointer category-pill" data-category="emergency">
                        <div class="glass p-4 rounded-2xl shadow-sm w-16 h-16 flex items-center justify-center">
                            <span class="text-2xl">🚨</span>
                        </div>
                        <span class="text-xs text-gray-600">Emergency</span>
                    </div>
                </section>

                <!-- Places List -->
                <section id="placesList" class="px-6 space-y-4 pb-6">
                    <!-- Places will be dynamically inserted here -->
                </section>
            </div>

            <!-- Map Screen -->
            <div id="mapScreen" class="screen hidden">
                <!-- Filter Pills -->
                <div class="flex gap-2 px-6 pb-4">
                    <button class="glass px-4 py-2 rounded-full text-sm hover:bg-white/50">
                        <span class="mr-2">💾</span> Save
                    </button>
                </div>
                
                <!-- Map Container -->
                <div id="mapContainer" class="px-6">
                    <div class="glass rounded-3xl h-96 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-100 to-green-100 opacity-50"></div>
                        <!-- Mock Map Pins -->
                        <div class="absolute top-20 left-16 w-8 h-8 bg-purple-500 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-bold">
                            🍕
                        </div>
                        <div class="absolute top-32 right-20 w-8 h-8 bg-purple-500 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-bold">
                            🏨
                        </div>
                        <div class="absolute bottom-20 left-32 w-8 h-8 bg-purple-500 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-bold">
                            ☕
                        </div>
                        <div class="absolute top-40 left-40 w-8 h-8 bg-purple-500 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-bold">
                            🚻
                        </div>
                        <div class="absolute bottom-32 right-16 w-8 h-8 bg-purple-500 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-bold">
                            🌄
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Install Button -->
        <button id="installBtn" class="fixed bottom-24 right-6 bg-purple-500 text-white px-6 py-3 rounded-full shadow-2xl hidden z-50 bottom-nav-item">
            <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Install App →
            </span>
        </button>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 glass-dark p-4 flex justify-around items-center rounded-t-[32px] z-50 shadow-2xl">
            <button class="bottom-nav-item text-purple-500" data-nav="home">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
            </button>
            <button class="bottom-nav-item text-gray-400" data-nav="explore">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
            <button class="bottom-nav-item text-gray-400" data-nav="saved">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                </svg>
            </button>
            <button class="bottom-nav-item text-gray-400" data-nav="profile">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </button>
        </nav>
    </div>

    <!-- Place Details Overlay -->
    <div id="detailsOverlay" class="fixed inset-0 bg-black/50 z-50 hidden">
        <div class="absolute inset-x-0 bottom-0 top-20 bg-white rounded-t-[32px] overflow-hidden slide-up">
            <div id="detailsContent">
                <!-- Details will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="placesData.js"></script>
    <script src="app-new.js"></script>
</body>
</html>
