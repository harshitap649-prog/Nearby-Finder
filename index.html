<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscoverLocal - PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #map { height: 250px; border-radius: 24px; margin: 15px; z-index: 1; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-white min-h-screen pb-20 font-sans">

    <header class="p-6">
        <div class="glass rounded-3xl p-4 shadow-sm mb-4">
            <input type="text" placeholder="Find places near you" class="w-full bg-transparent outline-none text-gray-700 p-2">
        </div>
        
        <div class="flex gap-2 no-scrollbar overflow-x-auto pb-2 text-sm text-gray-500">
            <button class="glass px-4 py-2 rounded-full whitespace-nowrap bg-indigo-500 text-white">within 5km</button>
            <button class="glass px-4 py-2 rounded-full whitespace-nowrap">10km</button>
            <button class="glass px-4 py-2 rounded-full whitespace-nowrap">45km</button>
        </div>
    </header>

    <section class="flex gap-4 overflow-x-auto px-6 no-scrollbar">
        <div class="flex flex-col items-center gap-2"><div class="glass p-4 rounded-2xl shadow-sm">🍕</div><span class="text-xs">Food</span></div>
        <div class="flex flex-col items-center gap-2"><div class="glass p-4 rounded-2xl shadow-sm">🏨</div><span class="text-xs">Hotels</span></div>
        <div class="flex flex-col items-center gap-2"><div class="glass p-4 rounded-2xl shadow-sm">🚻</div><span class="text-xs">Restroom</span></div>
        <div class="flex flex-col items-center gap-2"><div class="glass p-4 rounded-2xl shadow-sm">🌄</div><span class="text-xs">Travel</span></div>
        <div class="flex flex-col items-center gap-2"><div class="glass p-4 rounded-2xl shadow-sm">☕</div><span class="text-xs">Cafes</span></div>
    </section>

    <div id="map"></div>

    <section class="px-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-800">Nearby Popular</h3>
        <div class="glass rounded-3xl overflow-hidden shadow-lg p-3 flex gap-4">
            <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=400" class="w-24 h-24 rounded-2xl object-cover">
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <h4 class="font-bold">The Daily Grind</h4>
                    <span class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full">Open Now</span>
                </div>
                <p class="text-xs text-gray-500">⭐ 4.8 (234 reviews)</p>
                <p class="text-xs text-gray-400 mt-1">📍 1.2 km away</p>
            </div>
        </div>
    </section>

    <button id="installBtn" class="fixed bottom-24 right-6 bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl hidden z-50">
        Install App →
    </button>

    <nav class="fixed bottom-0 w-full glass p-4 flex justify-around items-center rounded-t-[32px] z-50 shadow-2xl">
        <button class="text-indigo-600">🏠</button>
        <button class="text-gray-400">🧭</button>
        <button class="text-gray-400">🔖</button>
        <button class="text-gray-400">👤</button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
